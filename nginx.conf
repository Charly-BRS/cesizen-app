# cesizen-app/nginx.conf
# Configuration Nginx pour servir l'application React (SPA) en production.
#
# Points clés :
#   - SPA fallback : toutes les routes inconnues renvoient index.html
#     (nécessaire car React Router gère le routage côté client)
#   - Cache long (1 an) sur les assets compilés par Vite (nommés avec un hash)
#   - Compression gzip activée pour réduire la taille des transferts
#   - Headers de sécurité basiques

server {
    listen 80;
    server_name _;

    # Dossier racine contenant les fichiers compilés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression Gzip ──────────────────────────────────────────────────────
    # Réduit la taille des fichiers JS/CSS/HTML lors du transfert réseau
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Cache long pour les assets Vite ──────────────────────────────────────
    # Vite génère des noms de fichiers avec un hash (ex: main.a1b2c3d4.js)
    # Ces fichiers ne changent jamais → on peut les mettre en cache 1 an
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    # Si le fichier demandé n'existe pas sur le disque (ex: /dashboard, /login),
    # on renvoie index.html pour que React Router prenne la main
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Headers de sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
