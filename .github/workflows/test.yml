# ============================================================
# Workflow CI : Tests de l'application React (cesizen-app)
# Le code est à la RACINE du repo (pas dans un sous-dossier)
# ============================================================
name: Tests App Web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  app-tests:
    name: Lint ESLint + Vérification TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      # Installation de Node.js avec cache npm
      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Le package-lock.json est à la racine du repo
          cache-dependency-path: package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # Vérifier la qualité du code avec ESLint
      - name: Lancer ESLint
        run: npm run lint

      # Vérifier les types TypeScript
      # "tsc -b --noEmit" compile sans générer de fichiers
      - name: Vérifier les types TypeScript
        run: npx tsc -b --noEmit
