# ============================================================
# Workflow CI/CD : Build et déploiement de l'app React
# Ce workflow s'exécute uniquement sur la branche main
# Il construit le site statique (dist/) et le déploie
# ============================================================
name: Build & Deploy App Web

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Construire l'application React
  # ─────────────────────────────────────────────
  build-app:
    name: Build application React (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # "npm run build" lance "tsc -b && vite build"
      # Le résultat est dans le dossier dist/
      - name: Construire l'application
        run: npm run build

      # Sauvegarder le dossier dist/ pour le job de déploiement
      - name: Sauvegarder l'artefact de build
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2 : Déploiement en staging
  # Se lance uniquement si le build a réussi
  # ─────────────────────────────────────────────
  deploy-app-staging:
    name: Déployer l'app en staging
    needs: build-app
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Télécharger l'artefact de build
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist

      # TODO : Remplace ce bloc par ton vrai déploiement
      # Exemples : Netlify, Vercel, GitHub Pages, serveur SSH, etc.
      - name: Déployer vers l'hébergement
        run: |
          echo "Fichiers prêts dans dist/"
          ls dist/
          echo "✅ Étape de déploiement prête - ajoute ta commande ici"
