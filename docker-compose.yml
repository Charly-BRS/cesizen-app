# docker-compose.yml
# Lance le frontend React en mode développement avec hot-reload
version: '3.9'

services:
  # Service frontend : serveur de développement Vite + React
  frontend:
    image: node:22-alpine
    container_name: cesizen_frontend
    working_dir: /app
    volumes:
      # Monte le code source local dans le conteneur (hot-reload)
      - .:/app
      # Évite d'écraser le node_modules du conteneur avec celui de l'hôte
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    networks:
      - cesizen_network

networks:
  cesizen_network:
    driver: bridge
